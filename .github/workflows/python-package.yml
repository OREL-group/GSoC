# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:

    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11","3.12","3.13","3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        pip install -r "Open Source Sustainibility using LLMs/Environment_Creation/requirements.txt"
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --extend-ignore=F401 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --extend-ignore=F401 --statistics
    # - name: Test with pytest
    #   run: |
    #     pytest -q || echo "No tests found, skipping."
